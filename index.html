<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Search</title>
  <link rel="icon" type="image/png" href="https://cdn3.iconfinder.com/data/icons/social-network-30/512/social-06-512.png">
  
  <style>
	  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
	  
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 40vh;
      margin: 0;
	  background-color: #212121
	  font-family: 'Inter', sans-serif;
    }

    #search-container {
      text-align: center;
	  width: 100%;
    }

    #search-bar {
      padding: 14px 18px;
	  font-size: 16px;
	  width: 20%;
	  border-radius: 999px;
	  border: 1px solid #3a3a3a;
	  background-color: #121212;
	  color: white;
	  outline: none;
    }

	#search-bar::placeholder {
  		color: #9e9e9e;
	}

	  #search-bar:focus {
	  border-color: #ff0000;
	  box-shadow: 0 0 0 2px rgba(255, 0, 0, 0.25);
	}
	  
    #search-button {
	  padding: 14px 22px;
	  font-size: 15px;
	  font-weight: 500;
	  border-radius: 999px;
	  border: none;
	  background-color: #ff0000;
	  color: white;
	  cursor: pointer;
	  transition: background-color 0.15s ease, transform 0.1s ease;
    }

	#search-button:hover {
  		background-color: #e60000;
	}

	#search-button:active {
  		transform: scale(0.96);
	}
	  
	img, button, br {
            -drag: none;
            user-select: none;
            -moz-user-select: none;
            -webkit-user-drag: none;
            -webkit-user-select: none;
            -ms-user-select: none;
         }

	a {
		color: white;
		text-decoration: none;
	}
  </style>
</head>
<body>

  <div id="search-container">
    <a href="https://youtube.com"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/54/YouTube_dark_logo_2017.svg/2560px-YouTube_dark_logo_2017.svg.png" alt="YouTube Logo" height="60"></a>
    <br><br>
    <form action="https://www.youtube.com/results" method="get" target="_blank">
      <input type="text" id="search-bar" name="search_query" placeholder="Search on YouTube" required>
      <button type="submit" id="search-button">Search</button>
    </form>
	  <br><br>
	  <a href="https://www.youtube.com/playlist?list=WL">Watch Later List</a>
  </div>

  <script>
    // Focus the search bar on page load
    window.onload = function() {
      document.getElementById('search-bar').focus();
    };
  </script>

</body>
</html>
